version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shop_ledger_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopledger
      POSTGRES_PASSWORD: shopledger
      POSTGRES_DB: shop_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopledger -d shop_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shop_ledger_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://shopledger:shopledger@postgres:5432/shop_ledger
      JWT_SECRET: ${JWT_SECRET:-shop-ledger-local-dev-secret-change-before-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://shop-ledger-ashy.vercel.app}
    ports:
      - "8080:8080"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://shop-ledger-api.onrender.com/api}
    container_name: shop_ledger_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres_data:
